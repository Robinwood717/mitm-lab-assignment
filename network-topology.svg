<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#fafafa"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Network Topology — MITM Lab</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6b7280">VirtualBox Host-Only Network · 192.168.1.0/24</text>

  <!-- Host-Only Network cloud -->
  <ellipse cx="450" cy="300" rx="190" ry="70" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#4b5563">Host-Only Virtual Network</text>
  <text x="450" y="313" text-anchor="middle" font-size="11" fill="#6b7280">(VirtualBox, isolated)</text>

  <!-- Gateway box (top) -->
  <g>
    <rect x="350" y="90" width="200" height="100" rx="10" fill="#ffffff" stroke="#059669" stroke-width="2"/>
    <rect x="350" y="90" width="200" height="10" rx="5" fill="#059669"/>
    <text x="450" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">pfSense</text>
    <text x="450" y="148" text-anchor="middle" font-size="12" fill="#374151">Gateway / Router</text>
    <text x="450" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">192.168.1.1</text>
  </g>

  <!-- Kali box (bottom-left) -->
  <g>
    <rect x="60" y="420" width="220" height="110" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <rect x="60" y="420" width="220" height="10" rx="5" fill="#dc2626"/>
    <text x="170" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Kali Linux</text>
    <text x="170" y="480" text-anchor="middle" font-size="12" fill="#374151">Attacker</text>
    <text x="170" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">192.168.1.50</text>
  </g>

  <!-- Ubuntu box (bottom-right) -->
  <g>
    <rect x="620" y="420" width="220" height="110" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <rect x="620" y="420" width="220" height="10" rx="5" fill="#2563eb"/>
    <text x="730" y="460" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Ubuntu</text>
    <text x="730" y="480" text-anchor="middle" font-size="12" fill="#374151">Victim</text>
    <text x="730" y="500" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">192.168.1.100</text>
  </g>

  <!-- Connections to switch/cloud -->
  <line x1="450" y1="190" x2="450" y2="232" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="280" y1="440" x2="370" y2="350" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="620" y1="440" x2="530" y2="350" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Legit path (faded, struck through) -->
  <line x1="640" y1="420" x2="500" y2="195" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="640" y="300" font-size="11" fill="#9ca3af" transform="rotate(-58 640,300)">νόμιμη διαδρομή (πριν)</text>

  <!-- Attack path: Victim -> Kali -> Gateway -->
  <line x1="650" y1="450" x2="260" y2="455" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="455" y="442" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">ARP poisoned traffic</text>

  <line x1="200" y1="418" x2="380" y2="195" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="245" y="300" font-size="12" font-weight="600" fill="#dc2626" transform="rotate(58 245,300)">forwarded to gateway</text>

  <!-- Legend -->
  <g>
    <rect x="60" y="565" width="14" height="14" fill="#dc2626"/>
    <text x="80" y="577" font-size="12" fill="#374151">MITM path (μετά το ARP spoofing)</text>

    <line x1="380" y1="572" x2="404" y2="572" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="412" y="577" font-size="12" fill="#374151">Νόμιμη διαδρομή (πριν την επίθεση)</text>
  </g>

</svg>
